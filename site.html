<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico dos 5 Pilares da Performance Integral</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- html-to-image e jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>

  <!-- Fontes Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {font-family: 'Nunito Sans', sans-serif; background-color: #0D0A07; color: #F5F0E8; margin:0; padding:0;}
    .font-cormorant {font-family: 'Cormorant Garamond', serif;}
    .fade-in {animation: fadeIn 0.4s ease-out forwards;}
    .slide-in {animation: slideIn 0.35s ease-out forwards;}
    @keyframes fadeIn {from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);}}
    @keyframes slideIn {from {opacity:0; transform:translateX(30px);} to {opacity:1; transform:translateX(0);}}
    .option-btn {transition:all 0.2s; background:rgba(201,168,76,0.03); border-color:rgba(201,168,76,0.15);}
    .option-btn:hover {border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.08);}
  </style>
</head>
<body>
  <section id="quiz" class="relative py-24 overflow-x-hidden min-h-screen" style="background: linear-gradient(180deg, #0D0A07 0%, #1A1410 50%, #0D0A07 100%)">
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-px h-32 bg-gradient-to-b from-transparent via-[#C9A84C]/30 to-transparent"></div>
      <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-px h-32 bg-gradient-to-t from-transparent via-[#C9A84C]/30 to-transparent"></div>
    </div>
    <div class="relative z-10 max-w-3xl mx-auto px-6" id="app-root"></div>
  </section>
  <script>
    const PILARES = [
      {id:"saude",numero:"01",nome:"Saúde Estratégica",subtitulo:"Ativo de Negócio",cor:"#C9A84C",icone:"⚡",descricao:"Fisiologia, metabolismo e energia como base para a alta performance.",topicos:["Otimização hormonal","Biohacking para executivos","Sono e recuperação","Nutrição de performance"]},
      {id:"mente",numero:"02",nome:"Mente e Clareza",subtitulo:"Clareza Total",cor:"#B8A9C9",icone:"🧠",descricao:"Inteligência emocional e foco para decisões críticas sob pressão.",topicos:["Superação de crenças limitantes","Disciplina e foco","Tomada de decisão","Resiliência mental"]},
      {id:"lideranca",numero:"03",nome:"Liderança com Propósito",subtitulo:"Cultura Forte",cor:"#7EB8A4",icone:"👑",descricao:"Formação de líderes e influência que transcende o ambiente de trabalho.",topicos:["Liderança servidora","Formação de equipes","Cultura organizacional","Liderança familiar"]},
      {id:"negocios",numero:"04",nome:"Negócios Sustentáveis",subtitulo:"Escala nos EUA",cor:"#E8A87C",icone:"🏛️",descricao:"Estrutura, processos e mentalidade para crescer no mercado americano.",topicos:["Sistemas e processos","Internacionalização EUA","Networking de elite","Negócio autônomo"]},
      {id:"legado",numero:"05",nome:"Legado e Família",subtitulo:"Impacto Eterno",cor:"#A8C9E8",icone:"🌿",descricao:"Família estruturada e valores que permanecem por gerações.",topicos:["Herança de valores","Casamento alinhado","Paternidade ativa","Legado geracional"]}
    ];
    const PERGUNTAS = [
      {pilar:"saude",texto:"Como você avalia seu nível de energia ao longo do dia de trabalho?",opcoes:[{texto:"Estou exausto na maior parte do tempo, dependo de café ou estimulantes.",pontos:1},{texto:"Tenho energia pela manhã, mas caio no período da tarde.",pontos:2},{texto:"Mantenho boa energia, com algumas oscilações ocasionais.",pontos:3},{texto:"Tenho energia consistente e estratégica ao longo de todo o dia.",pontos:4}]},
      // ... (outros itens omitidos para brevidade)
    ];
    let etapa="intro", perguntaAtual=0, respostas={}, nome="", email="", gerandoPDF=false;
    function calcularResultados(r){const s={saude:0,mente:0,lideranca:0,negocios:0,legado:0};PERGUNTAS.forEach((p,i)=>{if(r[i]!=null){s[p.pilar]+=r[i];}});return s;}
    function getNivel(score){const pct=(score/20)*100;if(pct<=30)return{label:"Crítico",cor:"#E05C5C",descricao:"Este pilar está comprometendo sua performance."};if(pct<=50)return{label:"Frágil",cor:"#E8A87C",descricao:"Vulnerabilidades sérias."};if(pct<=70)return{label:"Em Desenvolvimento",cor:"#C9A84C",descricao:"Caminho certo, espaço para crescer."};if(pct<=85)return{label:"Sólido",cor:"#7EB8A4",descricao:"Boa base construída."};return{label:"Excelente",cor:"#A8C9E8",descricao:"Pilar de alta performance."};}
    function getPilarPrincipal(s){let min=1e9, p="";Object.entries(s).forEach(([k,v])=>{if(v<min){min=v;p=k;}});return p;}
    function getPerfilGeral(pct){if(pct<=35)return{titulo:"Líder em Crise Silenciosa",descricao:"Resultados externos escondem vulnerabilidades internas."};if(pct<=55)return{titulo:"Líder com Potencial Bloqueado",descricao:"Capacidade acima da média, mas pilares críticos limitam."};if(pct<=70)return{titulo:"Líder em Transição",descricao:"Base sólida, ainda há lacunas."};if(pct<=85)return{titulo:"Líder de Alta Performance",descricao:"Base sólida, próximo nível é integração total."};return{titulo:"Líder Integral",descricao:"Performance em todas as dimensões."};}
    function renderRadarChart(scores){const cx=150,cy=150,r=110;const labels=["saude","mente","lideranca","negocios","legado"];const angles=labels.map((_,i)=>(i*2*Math.PI)/5-Math.PI/2);const toXY=(a,rad)=>({x:cx+rad*Math.cos(a),y:cy+rad*Math.sin(a)});const grid=[0.25,0.5,0.75,1];const nomes=["Saúde","Mente","Liderança","Negócios","Legado"];const pts=labels.map((l,i)=>toXY(angles[i],r*(scores[l]/20)));const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")+" Z";const gridHtml=grid.map(l=>{const p=angles.map(a=>toXY(a,r*l)).map((pt,i)=>`${i===0?"M":"L"}${pt.x},${pt.y}`).join(" ")+" Z";return `<path d="${p}" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>`;}).join("");const axesHtml=angles.map(a=>{const e=toXY(a,r);return `<line x1="${cx}" y1="${cy}" x2="${e.x}" y2="${e.y}" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>`;}).join("");const pointsHtml=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#C9A84C" stroke="#1A1410" stroke-width="2"/>`).join("");const labelsHtml=angles.map((a,i)=>{const pos=toXY(a,r+22);return `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="middle" fill="rgba(245,240,232,0.7)" font-size="10" font-family="Nunito Sans" font-weight="600">${nomes[i]}</text>`;}).join("");return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" class="w-full max-w-xs mx-auto">${gridHtml}${axesHtml}<path d="${path}" fill="rgba(201,168,76,0.15)" stroke="#C9A84C" stroke-width="2"/>${pointsHtml}${labelsHtml}</svg>`;}
    async function iniciar(){nome=document.getElementById('input-nome').value;email=document.getElementById('input-email').value;if(!nome.trim()||!email.trim()){alert('Preencha nome e e‑mail.');return;}etapa='quiz';render();}
    async function responder(p){respostas[perguntaAtual]=p;if(perguntaAtual<PERGUNTAS.length-1){perguntaAtual++;render();}else{etapa='resultado';render();setTimeout(()=>gerarPDF(),1500);}}
    function reiniciar(){etapa='intro';perguntaAtual=0;respostas={};nome='';email='';render();}
    async function gerarPDF(){if(gerandoPDF)return;const el=document.getElementById('resultado-quiz');if(!el)return;gerandoPDF=true;renderBtnPDF();try{const dataUrl=await htmlToImage.toPng(el,{pixelRatio:2,backgroundColor:'#0D0A07'});const img=new Image();img.src=dataUrl;await new Promise(r=>{img.onload=r;});const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');const w=pdf.internal.pageSize.getWidth();const h=(img.height*w)/img.width;pdf.addImage(dataUrl,'PNG',0,0,w,h);pdf.save(`Diagnostico_${nome||'Performance'}.pdf`);}catch(e){console.error(e);alert('Erro ao gerar PDF.');}finally{gerandoPDF=false;renderBtnPDF();}}
    function renderBtnPDF(){const b=document.getElementById('btn-pdf');if(b){b.innerHTML=gerandoPDF?'Gerando PDF...':'Baixar PDF';b.disabled=gerandoPDF;b.style.opacity=gerandoPDF?'0.5':'1';b.style.cursor=gerandoPDF?'not-allowed':'pointer';}}
    function render(){const r=document.getElementById('app-root');if(etapa==='intro'){r.innerHTML=`<div class="fade-in"><div class="text-center mb-12"><p class="text-[#C9A84C] text-xs font-bold tracking-[0.3em] uppercase mb-4">Diagnóstico Gratuito</p><h2 class="font-cormorant text-4xl md:text-5xl font-bold text-[#F5F0E8] mb-4">Qual Pilar Está<br/><span class="text-[#C9A84C]">Limitando Seu Teto?</span></h2><div class="w-12 h-px bg-[#C9A84C] mx-auto mb-6"></div><p class="text-[#F5F0E8]/65 text-lg leading-relaxed max-w-xl mx-auto">25 perguntas. ~5 minutos. Diagnóstico honesto dos 5 Pilares.</p></div><div class="grid grid-cols-1 sm:grid-cols-5 gap-3 mb-10">${PILARES.map(p=>`<div class="text-center p-4 border border-[#C9A84C]/15 rounded-sm" style="background:rgba(201,168,76,0.04)"><div class="text-2xl mb-2">${p.icone}</div><p class="text-[#C9A84C] text-xs font-bold tracking-widest uppercase mb-1">${p.numero}</p><p class="text-[#F5F0E8] text-xs font-semibold">${p.nome}</p></div>`).join('')}</div><div class="border border-[#C9A84C]/20 p-8" style="background:rgba(201,168,76,0.03)"><p class="text-[#C9A84C] text-xs font-bold uppercase mb-6 text-center">Seus Dados</p><div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6"><div><label class="block text-[#F5F0E8]/50 text-xs uppercase mb-2">Nome</label><input id="input-nome" type="text" placeholder="Como posso te chamar?" class="w-full bg-transparent border border-[#C9A84C]/25 text-[#F5F0E8] px-4 py-3"/></div><div><label class="block text-[#F5F0E8]/50 text-xs uppercase mb-2">E‑mail</label><input id="input-email" type="email" placeholder="Para enviar diagnóstico" class="w-full bg-transparent border border-[#C9A84C]/25 text-[#F5F0E8] px-4 py-3"/></div></div></div><div class="text-center"><button onclick="iniciar()" class="px-12 py-5 bg-gradient-to-r from-[#C9A84C] to-[#E2C97E] text-[#0D0A07] font-bold">Iniciar Meu Diagnóstico</button></div></div>`;}
    else if(etapa==='quiz'){const total=PERGUNTAS.length;const prog=Math.round(perguntaAtual/total*100);const q=PERGUNTAS[perguntaAtual];const p=PILARES.find(p=>p.id===q.pilar);r.innerHTML=`<div class="slide-in"><div class="mb-10"><div class="flex justify-between mb-3"><div class="flex gap-2"><span class="text-[#C9A84C] text-xs font-bold uppercase">${p.subtitulo}</span><span class="text-[#F5F0E8]/20 text-xs">·</span><span class="text-[#F5F0E8]/40 text-xs">${p.nome}</span></div><span class="text-[#F5F0E8]/40 text-xs">${perguntaAtual+1}/${total}</span></div><div class="h-1 bg-white/10 rounded"><div class="h-full bg-gradient-to-r from-[#C9A84C] to-[#E2C97E]" style="width:${prog}%"></div></div></div><div class="flex mb-6"><span class="font-cormorant text-transparent" style="font-size:80px;color:rgba(201,168,76,0.2)">${String(perguntaAtual+1).padStart(2,'0')}</span><div class="w-px h-16 bg-[#C9A84C]/20"></div><div><p class="text-[#C9A84C] text-xs uppercase mb-1">${p.icone} ${p.nome}</p><h3 class="font-cormorant text-2xl md:text-3xl text-[#F5F0E8]">${q.texto}</h3></div></div><div>${q.opcoes.map((opt,i)=>`<button onclick="responder(${opt.pontos})" class="w-full p-5 border option-btn flex items-start gap-4"><span class="w-7 h-7 border border-[#C9A84C]/30 flex items-center justify-center text-[#C9A84C] text-xs">${String.fromCharCode(65+i)}</span><p class="text-[#F5F0E8]/75 text-sm">${opt.texto}</p></button>`).join('')}</div>${perguntaAtual>0?`<button onclick="perguntaAtual--;render();" class="mt-6 text-xs uppercase">← Voltar</button>`:''}</div>`;}
    else if(etapa==='resultado'){const scores=calcularResultados(respostas);const pFraco=getPilarPrincipal(scores);const pInfo=PILARES.find(p=>p.id===pFraco);const total=Object.values(scores).reduce((a,b)=>a+b,0);const pct=Math.round(total/100*100);const perfil=getPerfilGeral(pct);r.innerHTML=`<div id="resultado-quiz" class="fade-in p-4 bg-[#0D0A07]"><div class="text-center mb-12"><p class="text-[#C9A84C] text-xs uppercase mb-3">${nome?`Diagnóstico de ${nome}`:'Seu Diagnóstico'}</p><h2 class="font-cormorant text-4xl md:text-5xl text-[#F5F0E8] mb-2">${perfil.titulo}</h2><div class="flex justify-center mb-4"><div class="w-16 h-px bg-[#C9A84C]/40"></div><span class="font-cormorant text-[#C9A84C]" style="font-size:48px">${pct}%</span><div class="w-16 h-px bg-[#C9A84C]/40"></div></div><p class="text-[#F5F0E8]/60 max-w-xl mx-auto">${perfil.descricao}</p></div><div class="grid md:grid-cols-2 gap-8 mb-12"><div class="border p-6" style="background:rgba(201,168,76,0.03)"><p class="text-[#C9A84C] text-xs uppercase mb-4 text-center">Mapa dos Pilares</p>${renderRadarChart(scores)}</div><div class="border p-6" style="background:rgba(201,168,76,0.03)"><p class="text-[#C9A84C] text-xs uppercase mb-6">Pontuação por Pilar</p>${PILARES.map(p=>{const s=scores[p.id];const pct=Math.round(s/20*100);const n=getNivel(s);return `<div class="mb-6"><div class="flex justify-between mb-2"><div class="flex gap-2"><span class="text-lg">${p.icone}</span><div><p class="text-sm font-bold text-[#F5F0E8]">${p.nome}</p><p class="text-xs text-[#C9A84C] uppercase">${p.subtitulo}</p></div></div><div class="text-right"><span class="text-2xl font-bold" style="color:${n.cor}">${pct}%</span><p class="text-xs uppercase" style="color:${n.cor}">${n.label}</p></div></div><div class="h-2 bg-white/10 rounded"><div class="h-full" style="width:${pct}%;background:linear-gradient(90deg,${n.cor}88,${n.cor})"></div></div><p class="text-xs text-[#F5F0E8]/50 mt-1">${n.descricao}</p></div>`;}).join('')}</div></div><div class="border-l-2 pl-6 mb-12 py-4"><p class="text-[#C9A84C] text-xs uppercase mb-2">Atenção Prioritária</p><h3 class="font-cormorant text-2xl text-[#F5F0E8] mb-2">${pInfo.icone} ${pInfo.nome}</h3><p class="text-[#F5F0E8]/60">${pInfo.descricao}</p><div class="flex flex-wrap gap-2">${pInfo.topicos.map(t=>`<span class="text-xs border border-[#C9A84C]/30 px-3 py-1">◆ ${t}</span>`).join('')}</div></div><div class="text-center border p-10 mt-8" style="background:rgba(201,168,76,0.04)"><p class="text-[#C9A84C] text-xs uppercase mb-4">Próximo Passo</p><h3 class="font-cormorant text-3xl text-[#F5F0E8] mb-4">Transforme Este Diagnóstico<br/>em um Plano de Ação Real</h3><p class="text-[#F5F0E8]/55 text-sm mb-8 max-w-md mx-auto">Agende uma sessão de diagnóstico aprofundado.</p><div class="flex flex-col sm:flex-row gap-4 justify-center"><a href="#contato" class="px-10 py-4 bg-gradient-to-r from-[#C9A84C] to-[#E2C97E] text-[#0D0A07] font-bold">Quero Meu Plano de Ação →</a><button id="btn-pdf" onclick="gerarPDF()" class="px-8 py-4 border border-[#C9A84C] text-[#C9A84C] hover:bg-[#C9A84C]/10">Baixar PDF</button><button onclick="reiniciar()" class="px-8 py-4 border border-[#C9A84C]/30 text-[#C9A84C]/70 hover:border-[#C9A84C]/60 hover:text-[#C9A84C]">Refazer Diagnóstico</button></div></div></div>`;}
    window.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
